name: My first pipeline
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v5
      - name: setup Node.js 
        uses: actions/setup-node@v4    
      - name: Build image
        run: |
         docker build -t ${{secrets.DOCKER_USERNAME}}/ciportofolio:${{github.run_number}} .
         docker build -t ${{secrets.DOCKER_USERNAME}}/ciportofolio:19 .
      - name: Docker login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push image to registry
        run: |
         docker push ${{secrets.DOCKER_USERNAME}}/ciportofolio:${{github.run_number}}
         docker push ${{secrets.DOCKER_USERNAME}}/ciportofolio:19
      
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: SSh to Linux and run container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          #port: ${{ secrets.PORT }}
          script: |
              docker rm -f portfolio || echo ""
              docker run -d --name portfolio -p 8080:80 ${{secrets.DOCKER_USERNAME}}/ciportofolio
